body:
  text: 易緯辨終備漢鄭康成注孔子表河圖皇參持曰天以斗視日發明皇以戲招始掛八卦談皇參持河圖名也言以北斗之星視聼而以日月發其明以昭示天地三皇伏戲始卦以示後世之人謂使觀見之矣煌煌之耀乾為之岡合凝之類坤握其方煌煌光輝之貌耀日月五星也皆以乾岡圗言盡繫於天也方道也合凝為首形之類坤則握其道皆繫於地也雄雌呿吟六節搖通雄雌天地呿吟闔閉也六節六子也搖通言六子動行天地之氣繫曰閉户謂之坤闢户謂之乾又曰天地定位山澤通氣也萬物孶甲曰營始東孶生也甲東方之行物所生故數以始也三五環復七十六載閠反常三五千百二十嵗歷厯復其本七十六載則餘分盡言天終則後始者耳也旋出樞乾機據參衡出坤離授提巽招震卯乾正旋樞衡招皆北星值乾君之象旋星出樞之政教機正機之發動故其位據參西方之宿五事五方為言猶君出政之言也玉衡之星言主布天之手法於坤離授明提巽招震之職權君平事之臣卯東方之宿也按五事五方與正文不相應疑有脫文緯嬴縮辰中效當緯五緯盈縮行有進退也辰星仲謂卯酉子午候星辰之常以四仲之月視其效當與不也必視熒惑所在時殃熒惑主理天下故必候之以知時禍循嵗德鎮之光鎮主章存德故候星之光以故德之所在也拒白甄商金大謀兵拒白太白之主殺罰而金宿故甄商金聲言太白大為衆之候元武兵大謀之也雪霜水疾旱饑喪地動山崩淪慧隕物吝悖淫崩淪若步庶崩者也慧彗隕隕石也立社稷之類悖見淫散也負之傍害水决江德潰河空移徙赤黃負之示聞傍水决貌江德潰亦謂决亂而出也空竭之移徙地震之類也踊起物怪踴躍出見以日昴衝望之曰乘隂氣按示聞二字疑誤踊起以下與正文不相應疑有脫文箕風飄石折拔樹酷深酷暴也飄石折樹言繫夾也暴深害物甚也長大卒嬉暴大楊暴大言不以漸楊楊大貌也解裂珥偶虹霓㜸行解陷也淪也裂地圯珥偶虹霓皆日傍氣名妖沉藏相桐水害滂滂沉藏當藏以物相當為桐射發立也滂滂水貌也日之既陽德消月之毁刑將將日既日蝕明盡故陽消月之毁亦謂月蝕常過也陰將將大也隂主刑隂似脫之大怪土蒙羣鳥却野獸羣遊人孶來濟者來成也其氣不效君不能修德杜漸防萌黃霧滿者亂氣起也朝方陽埃冦將來十刃之莫四出虻牛招尸益士與之開皆離坎之異也鱗出者聖人將起授之符緯有王者則聚生五帝之坐其帝將王則其坐亡光也按此注皆與正文不相合疑有脫簡按録視天比象由按録按河圗之録又視按王光之異比其象以觀其光由起也神靈悉存八八通時在察也神靈三光異及符瑞也既按三光之異及符瑞以知起者所由以六十四卦通其謂以何按正文無在字而注言在察也亦疑有脫文小辨終備無遺戒郤知億察世郵世郵郤變也帝王奉命永安治命猶書也至哉易三聖謀專密惡必孰思三聖伏羲文王孔子按史記張守節正義引易中偹云孔子正月為商瞿筮曰瞿當有五丈夫子子貢曰何以知之子曰卦遇大畜艮之二世九二甲寅木為世九五景子水為應陽爻五應有五子云云檢今書無其文蓋非全本也自伏羲以來漢永和元年凡四十萬九千三百八十九嵗按此為後人所加非易緯本文

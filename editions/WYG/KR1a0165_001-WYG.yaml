body:
  text: 易緯辨終備漢鄭康成注孔子表河圖皇參持曰天以斗視日𤼵明皇以戯招始掛八卦談皇參持河圖名也言以北斗之星視聼而以日月𤼵其明以昭示天地三皇伏戯始卦以示後世之人謂使觀見之矣煌煌之燿乾爲之岡合凝之類坤握其方煌煌光輝之貌燿日月五星也皆以乾岡圗言盡繫於天也方道也合凝爲首形之類坤則握其道皆繫於地也雄雌呿吟六節摇通雄雌天地呿吟闔閉也六節六子也摇通言六子動行天地之氣繫曰閉户謂之坤闢户謂之乾又曰天地定位山澤通氣也萬物孶甲曰營始東孶生也甲東方之行物所生故數以始也三五環復七十六載閠反常三五千百二十嵗歴厯復其本七十六載則餘分盡言天終則後始者耳也旋出樞乾機據參衡出坤離授提巽招震夘乾正旋樞衡招皆北星值乾君之象旋星出樞之政教機正機之𤼵動故其位據參西方之宿五事五方爲言猶君出政之言也玉衡之星言主布天之手法於坤離授明提巽招震之職權君平事之臣夘東方之宿也按五事五方與正文不相應疑有脫文緯嬴縮辰中効當緯五緯盈縮行有進退也辰星仲謂夘酉子午候星辰之常以四仲之月視其効當與不也必視熒惑所在時殃熒惑主理天下故必候之以知時禍循嵗徳鎮之光鎮主章存徳故候星之光以故徳之所在也拒白甄商金大謀兵拒白太白之主殺罰而金宿故甄商金聲言太白大爲衆之候元武兵大謀之也雪霜水疾旱饑䘮地動山崩淪慧隕物恡悖淫崩淪若歩庶崩者也慧彗隕隕石也立社稷之類悖見淫散也負之傍害水决江徳潰河空移徙赤黄負之示聞傍水决貌江徳潰亦謂决亂而出也空竭之移徙地震之類也踊起物恠踴躍出見以日􅄧衝望之曰乗隂氣按示聞二字疑誤踊起以下與正文不相應疑有脫文箕風飄石折㧞樹酷深酷暴也飄石折樹言繋夾也暴深害物甚也長大卒嬉暴大楊暴大言不以漸楊楊大貌也解裂珥偶虹蜺㜸行解陷也淪也裂地圯珥偶虹蜺皆日傍氣名妖沉藏相桐水害滂滂沉藏當藏以物相當爲桐射𤼵立也滂滂水貌也日之既陽徳消月之毁刑將將日既日蝕明盡故陽消月之毁亦謂月蝕常過也陰將將大也隂主刑隂似脫之大恠土蒙羣鳥却野獸羣遊人孶來濟者來成也其氣不效君不能修徳杜漸防萌黄霧滿者亂氣起也朝方陽埃冦將來十刃之莫四出虻牛招尸益士與之開皆離坎之異也鱗出者聖人将起授之符緯有王者則聚生五帝之坐其帝将王則其坐亡光也按此註皆與正文不相合疑有脫簡按録視天比象由按録按河圗之錄又視按王光之異比其象以觀其光由起也神靈悉存八八通時在察也神靈三光異及符瑞也既按三光之異及符瑞以知起者所由以六十四卦通其謂以何按正文無在字而註言在察也亦疑有脱文小辨終備無遺戒郄知億察世郵世郵郄變也帝王奉命永安治命猶書也至哉易三聖謀專密惡必孰思三聖伏羲文王孔子按史記張守節正義引易中偹云孔子正月爲商瞿筮曰瞿當有五丈夫子子貢曰何以知之子曰卦遇大畜艮之二世九二甲寅木爲世九五景子水爲應陽爻五應有五子云云檢今書無其文葢非全本也自伏羲以來漢永和元年凡四十萬九千三百八十九嵗按此爲後人所加非易緯本文
